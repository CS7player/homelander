<ion-header [translucent]="true" class="custom-header">
 <ion-toolbar class="custom-toolbar border-b border-green-500/20">
  <ion-title class="text-lg font-semibold text-white flex items-center gap-2 px-2">
   <i class="fa-solid fa-users text-green-400"></i>
   Users
  </ion-title>
 </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="custom-bg">
 <div class="p-3 space-y-3">
  @for(user of lan.peers;track $index){
  <div (click)="onUserClick(user)" class="flex items-center gap-3 p-3 rounded-xl
           bg-zinc-900 border border-green-500/10
           shadow-md hover:border-green-500/40
           active:scale-[0.98] transition cursor-pointer">
   <!-- Avatar (Purple) -->
   <div class="w-10 h-10 rounded-full
             bg-purple-600 text-white
             flex items-center justify-center font-semibold
             shadow-[0_0_12px_rgba(168,85,247,0.4)]">
    {{ user.username.charAt(0).toUpperCase() }}
   </div>
   <!-- Username -->
   <div class="flex-1">
    <p class="text-white font-medium">
     {{ user.username }}
    </p>
    <p class="text-xs text-gray-400">
     Tap to open chat
    </p>
   </div>
   <!-- Arrow -->
   <div class="text-green-400 text-xl">
    <i class="fa-solid fa-chevron-right"></i>
   </div>
  </div>
  }
 </div>
</ion-content>
